<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSEH Admit Card 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="top-space"></div>
    <div class="top-space2"></div>

    <h2>BSEH Admit Card 2026</h2>

    <!-- Student Detail -->
    <div class="section">
        <div class="section-title">
            Student Detail
        </div>

        <table>
            <tr>
                <td >Name</td>
                <td style="font-weight: 700;">ROHIT</td>
            </tr>

            <tr>
                <td>Father Name / Mother Name / D.O.B.</td>
                <td style="font-weight: 700;">RAJESH KUMAR / AJMERI DEVI / 28/03/2010</td>
            </tr>

            <tr>
                <td>Roll No.</td>
                <td style="font-weight: 700;">1026133068</td>
            </tr>

            <tr>
                <td>Category</td>
                <td style="font-weight: 700;">COMPARTMENT</td>
            </tr>

        </table>
    </div>

    <!-- Photo & Signature -->
    <div class="section">

        <div class="section-title">
            Student Photo And Student Signature
        </div>

        <div class="photo-sign">

            <div class="photo-box">
                <img src="img.png" alt="Student Photo">
            </div>

            <div class="sign-box">
                <img src="sign.png" alt="Signature">
            </div>

        </div>

    </div>

</div>

</body>
</html>
